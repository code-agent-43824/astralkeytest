name: Build Flutter targets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  android:
    name: Android (ubuntu-latest)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK (debug)
        run: flutter build apk --debug
      - name: Upload Android artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  android-webauth-callback:
    name: Android WebAuth callback smoke (emulator)
    runs-on: ubuntu-latest
    needs: [android]
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: android-apk-debug
          path: ./artifact-apk
      - name: Emulator callback smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            adb install -r ./artifact-apk/app-debug.apk
            adb shell am start -W -n com.astralkey.astralkeytest/.MainActivity
            sleep 5
            adb shell am start -W -a android.intent.action.VIEW -d "astralkey://oauth.callback?code=ci_test_code&state=ci_test_state"
            sleep 3
            adb shell pidof com.astralkey.astralkeytest

  ios:
    name: iOS (macos-latest)
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - name: Install Flutter (stable)
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
      - name: Upload iOS artifact (single extraction)
        uses: actions/upload-artifact@v5
        with:
          name: ios-runner-no-codesign
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

  windows:
    name: Windows x64 (windows-latest)
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release
      - name: Upload Windows artifact (single extraction)
        uses: actions/upload-artifact@v5
        with:
          name: windows-x64-release
          path: build/windows/x64/runner/Release
          if-no-files-found: error
