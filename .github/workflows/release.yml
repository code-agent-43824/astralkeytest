name: Build and publish release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v0.0.1)'
        required: true
      title:
        description: 'Release title'
        required: false
      notes:
        description: 'Release notes'
        required: false

permissions:
  contents: write

jobs:
  android:
    name: Build Android artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: Build iOS artifact (no codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: release-ios-runner-app
          path: build/ios/iphoneos/Runner.app
          if-no-files-found: error

  windows:
    name: Build Windows artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64-dir
          path: build/windows/x64/runner/Release
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Package release assets (single archives)
        run: |
          set -e
          mkdir -p release-assets
          cp dist/release-android-apk/app-release.apk release-assets/
          cd dist/release-ios-runner-app
          zip -r ../../release-assets/Runner-ios-release-no-codesign.zip Runner.app
          cd ../../dist/release-windows-x64-dir
          zip -r ../../release-assets/windows-x64-release.zip Release
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.inputs.tag }}
          TITLE: ${{ github.event.inputs.title }}
          NOTES: ${{ github.event.inputs.notes }}
        run: |
          set -e
          title="${TITLE:-$TAG}"
          notes="${NOTES:-Automated release build from workflow_dispatch.}"

          if gh release view "$TAG" -R "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber -R "$GH_REPO"
            gh release edit "$TAG" --title "$title" --notes "$notes" -R "$GH_REPO"
          else
            gh release create "$TAG" release-assets/* --title "$title" --notes "$notes" -R "$GH_REPO"
          fi
