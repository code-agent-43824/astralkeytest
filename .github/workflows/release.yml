name: Build and publish release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v0.0.1)'
        required: true
      title:
        description: 'Release title'
        required: false
      notes:
        description: 'Release notes'
        required: false

permissions:
  contents: write

jobs:
  android:
    name: Build Android artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  ios:
    name: Build iOS artifact (no codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Pack iOS app bundle
        run: |
          cd build/ios/iphoneos
          zip -r Runner-ios-release-no-codesign.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: release-ios-runner
          path: build/ios/iphoneos/Runner-ios-release-no-codesign.zip
          if-no-files-found: error

  windows:
    name: Build Windows artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Pack Windows build
        shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/windows-x64-release.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: build/windows/x64/runner/windows-x64-release.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [android, ios, windows]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
          TITLE: ${{ github.event.inputs.title }}
          NOTES: ${{ github.event.inputs.notes }}
        run: |
          set -e
          title="${TITLE:-$TAG}"
          notes="${NOTES:-Automated release build from workflow_dispatch.}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" --title "$title" --notes "$notes"
          else
            gh release create "$TAG" dist/* --title "$title" --notes "$notes"
          fi
