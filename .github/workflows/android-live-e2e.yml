name: Android WebAuth Live E2E (manual)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

jobs:
  android-webauth-live-e2e:
    name: Android WebAuth Live E2E (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ASTRAL_E2E_LOGIN: ${{ secrets.ASTRAL_E2E_LOGIN }}
      ASTRAL_E2E_PASSWORD: ${{ secrets.ASTRAL_E2E_PASSWORD }}
      ASTRAL_OIDC_CLIENT_ID: ${{ secrets.ASTRAL_OIDC_CLIENT_ID }}
      ASTRAL_OIDC_CLIENT_SECRET: ${{ secrets.ASTRAL_OIDC_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
          pub-cache-key: pub-:os:-:channel:-:version:-:arch:-${{ hashFiles('pubspec.lock') }}
      - name: Cache pub + Gradle directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-e2e-caches-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'android/**/gradle-wrapper.properties', 'android/**/*.gradle', 'android/**/*.gradle.kts') }}
          restore-keys: |
            android-e2e-caches-${{ runner.os }}-
      - name: Validate required secrets
        run: |
          test -n "$ASTRAL_E2E_LOGIN"
          test -n "$ASTRAL_E2E_PASSWORD"
          test -n "$ASTRAL_OIDC_CLIENT_ID"
          test -n "$ASTRAL_OIDC_CLIENT_SECRET"
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK (debug, e2e defines)
        run: |
          flutter build apk --debug \
            --dart-define=ASTRAL_E2E_AUTO_WEBAUTH=true \
            --dart-define=ASTRAL_OIDC_CLIENT_ID="$ASTRAL_OIDC_CLIENT_ID" \
            --dart-define=ASTRAL_OIDC_CLIENT_SECRET="$ASTRAL_OIDC_CLIENT_SECRET" \
            --dart-define=ASTRAL_OIDC_REDIRECT_URI=astralkey://oauth.callback
      - name: Emulator run (live auth callback final-result check)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            adb logcat -c
            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            adb shell am start -W -n com.astralkey.astralkeytest/.MainActivity
            sleep 10
            # Deliver callback while AppAuth flow is active
            adb shell am start -W -a android.intent.action.VIEW -d "astralkey://oauth.callback?code=ci_test_code&state=ci_test_state"
            sleep 8
            adb shell pidof com.astralkey.astralkeytest
            adb logcat -d > /tmp/logcat.txt
            adb logcat -d -s flutter:D WEB_AUTH:D *:S > /tmp/logcat_filtered.txt || true
            echo "--- WEB_AUTH markers (all logs) ---"
            grep "WEB_AUTH_" /tmp/logcat.txt || true
            echo "--- WEB_AUTH markers (filtered logs) ---"
            grep "WEB_AUTH_" /tmp/logcat_filtered.txt || true
            grep -q "WEB_AUTH_FLOW_STARTED" /tmp/logcat.txt || grep -q "WEB_AUTH_FLOW_STARTED" /tmp/logcat_filtered.txt || { echo "Missing WEB_AUTH_FLOW_STARTED marker"; exit 1; }
            grep -q "WEB_AUTH_RESULT" /tmp/logcat.txt || grep -q "WEB_AUTH_RESULT" /tmp/logcat_filtered.txt || { echo "Missing WEB_AUTH_RESULT marker"; exit 1; }
            ! grep -qi "user cancelled" /tmp/logcat.txt || { echo "Unexpected: user cancelled flow"; exit 1; }
